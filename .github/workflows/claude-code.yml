# Easy Claude Code — GitHub Actions Cloud Worker
# Installed by Easy Claude Code. Runs Claude Code with full tool access.
# Triggered via workflow_dispatch from the dashboard.
# Permission tier is set per-project from the dashboard.

name: Claude Code Task

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Task for Claude Code to execute'
        required: true
        type: string
      command_id:
        description: 'Dispatch queue ID for status callback'
        required: false
        type: string
      callback_url:
        description: 'Easy Claude Code API URL for status updates'
        required: false
        type: string
      permission_tier:
        description: 'Permission tier: locked, standard, or autonomous'
        required: false
        type: string
        default: 'standard'

permissions:
  contents: write

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Notify started
        if: inputs.callback_url && inputs.command_id
        run: |
          curl -s -X PATCH "${{ inputs.callback_url }}/api/dispatch/poll" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.EASY_CLAUDE_API_KEY }}" \
            -d "{\"command_id\": \"${{ inputs.command_id }}\"}" \
            || true

      - name: Write safety settings
        run: |
          TIER="${{ inputs.permission_tier }}"
          mkdir -p .claude

          if [ "$TIER" = "locked" ]; then
            # Locked: no allow rules, plan mode — every tool call needs external approval
            MODE="plan"
            ALLOW="[]"
          elif [ "$TIER" = "autonomous" ]; then
            # Autonomous: bypass permissions, deny list only
            MODE="bypassPermissions"
            ALLOW='["Bash(ls:*)", "Bash(cat:*)", "Bash(head:*)", "Bash(wc:*)", "Bash(du:*)", "Bash(find:*)", "Bash(grep:*)", "Bash(xargs:*)", "Bash(sed:*)", "Bash(tr:*)", "Bash(mkdir:*)", "Bash(cp:*)", "Bash(mv:*)", "Bash(rm:*)", "Bash(chmod:*)", "Bash(timeout:*)", "Bash(echo:*)", "Bash(printf:*)", "Bash(sort:*)", "Bash(file:*)", "Bash(unzip:*)", "Bash(cd:*)", "Bash(source:*)", "Bash(bash:*)", "Bash(export:*)", "Bash(kill:*)", "Bash(pkill:*)", "Bash(jobs:*)", "Bash(git:*)", "Bash(gh:*)", "Bash(node:*)", "Bash(npm:*)", "Bash(npx:*)", "Bash(pnpm:*)", "Bash(python:*)", "Bash(python3:*)", "Bash(pip:*)", "Bash(pip3:*)", "Bash(curl:*)", "Bash(nslookup:*)", "Bash(ping:*)", "Bash(netstat:*)", "Bash(vercel:*)", "Bash(supabase:*)", "Read", "WebSearch", "WebFetch"]'
          else
            # Standard (default): allow list for safe ops, deny list for dangerous ops
            MODE="default"
            ALLOW='["Bash(ls:*)", "Bash(cat:*)", "Bash(head:*)", "Bash(wc:*)", "Bash(du:*)", "Bash(find:*)", "Bash(grep:*)", "Bash(xargs:*)", "Bash(sed:*)", "Bash(tr:*)", "Bash(mkdir:*)", "Bash(cp:*)", "Bash(mv:*)", "Bash(rm:*)", "Bash(chmod:*)", "Bash(timeout:*)", "Bash(echo:*)", "Bash(printf:*)", "Bash(sort:*)", "Bash(file:*)", "Bash(unzip:*)", "Bash(cd:*)", "Bash(source:*)", "Bash(bash:*)", "Bash(export:*)", "Bash(kill:*)", "Bash(pkill:*)", "Bash(jobs:*)", "Bash(git:*)", "Bash(gh:*)", "Bash(node:*)", "Bash(npm:*)", "Bash(npx:*)", "Bash(pnpm:*)", "Bash(python:*)", "Bash(python3:*)", "Bash(pip:*)", "Bash(pip3:*)", "Bash(curl:*)", "Bash(nslookup:*)", "Bash(ping:*)", "Bash(netstat:*)", "Bash(vercel:*)", "Bash(supabase:*)", "Read", "WebSearch", "WebFetch"]'
          fi

          DENY='["Bash(rm -rf /)", "Bash(rm -rf ~)", "Bash(rm -rf /*)", "Bash(rm -rf ~/*)", "Bash(git push --force origin main)", "Bash(git push --force origin master)", "Bash(git reset --hard)", "Read(.env)", "Read(.env.*)", "Read(**/.env)", "Read(**/.env.*)", "Read(**/.env.local)", "Read(**/credentials.json)", "Read(**/*secret*)"]'

          jq -n \
            --arg mode "$MODE" \
            --argjson allow "$ALLOW" \
            --argjson deny "$DENY" \
            '{permissions: {defaultMode: $mode, allow: $allow, deny: $deny}}' \
            > .claude/settings.json

          echo "Permission tier: $TIER (mode: $MODE)"
          cat .claude/settings.json

      - name: Run Claude Code
        id: claude
        run: |
          TIER="${{ inputs.permission_tier }}"
          set +e

          if [ "$TIER" = "autonomous" ]; then
            PERM_FLAG="--permission-mode bypassPermissions"
          elif [ "$TIER" = "locked" ]; then
            PERM_FLAG="--permission-mode plan"
          else
            PERM_FLAG="--permission-mode default"
          fi

          OUTPUT=$(claude -p $PERM_FLAG "$TASK" 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          echo "claude_output<<CLAUDE_EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" | head -c 50000 >> "$GITHUB_OUTPUT"
          echo "CLAUDE_EOF" >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE
        env:
          TASK: ${{ inputs.task }}

      - name: Commit and push changes
        id: commit
        run: |
          git config user.name "Easy Claude Code"
          git config user.email "bot@easyclaudecode.app"

          if git diff --quiet && git diff --cached --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "No changes to commit"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          git add -A

          TASK_SHORT=$(echo "$TASK" | head -c 72)
          git commit -m "$TASK_SHORT

          Applied via Easy Claude Code (GitHub Actions)

          Co-Authored-By: Claude <noreply@anthropic.com>"

          git push
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
        env:
          TASK: ${{ inputs.task }}

      - name: Generate diff summary
        id: diff
        if: steps.commit.outputs.has_changes == 'true'
        run: |
          DIFF=$(git diff HEAD~1 --stat)
          echo "diff_stat<<DIFF_EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "DIFF_EOF" >> "$GITHUB_OUTPUT"

      - name: Notify completed
        if: always() && inputs.callback_url && inputs.command_id
        run: |
          if [ "${{ steps.claude.outputs.exit_code }}" = "0" ]; then
            STATUS="completed"
          else
            STATUS="failed"
          fi

          SUMMARY=$(echo '${{ steps.claude.outputs.claude_output }}' | tail -c 4000)
          COMMIT_SHA="${{ steps.commit.outputs.commit_sha }}"
          HAS_CHANGES="${{ steps.commit.outputs.has_changes }}"
          DIFF_STAT=$(echo '${{ steps.diff.outputs.diff_stat }}' | head -c 2000)

          jq -n \
            --arg command_id "${{ inputs.command_id }}" \
            --arg status "$STATUS" \
            --arg result_summary "$SUMMARY" \
            --arg commit_sha "$COMMIT_SHA" \
            --arg has_changes "$HAS_CHANGES" \
            --arg diff_stat "$DIFF_STAT" \
            '{
              command_id: $command_id,
              status: $status,
              result_summary: $result_summary,
              commit_sha: $commit_sha,
              has_changes: ($has_changes == "true"),
              diff_stat: $diff_stat
            }' > /tmp/payload.json

          curl -s -X POST "${{ inputs.callback_url }}/api/dispatch/complete" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.EASY_CLAUDE_API_KEY }}" \
            -d @/tmp/payload.json \
            || true
